<!DOCTYPE html>
<html>
<head>
  <title>Adyra Restaurant</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: #f8f8f8;
    }

    header {
      background: #e23744;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #e23744;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      font-size: 16px;
      margin-top: 10px;
    }

    .menu-item {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart {
      background: white;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
    }

    .admin {
      display: none;
    }

    .card {
      background: white;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
    }

    img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 5px;
    }

  </style>
</head>

<body>

<header>🍽️ Adyra Restaurant</header>

<div class="container">

<button onclick="showCustomer()">Customer</button>
<button onclick="showAdmin()">Admin</button>

<!-- CUSTOMER -->
<div id="customer">

<h3>Login</h3>
<input id="mobile" placeholder="Mobile Number">
<input id="tableNo" placeholder="Table Number">

<h3>Menu</h3>

<div class="menu-item">
  Pizza ₹200 <button onclick="addItem('Pizza',200)">Add</button>
</div>

<div class="menu-item">
  Burger ₹100 <button onclick="addItem('Burger',100)">Add</button>
</div>

<div class="menu-item">
  Pasta ₹150 <button onclick="addItem('Pasta',150)">Add</button>
</div>

<div class="cart">
<h3>Cart</h3>
<ul id="cart"></ul>
<h4 id="total"></h4>
</div>

<button onclick="placeOrder()">Place Order</button>

<h3>Upload Payment Screenshot</h3>
<input type="file" id="file">
<button onclick="uploadScreenshot()">Upload Screenshot</button>

</div>

<!-- ADMIN -->
<div id="admin" class="admin">

<h3>Search Order</h3>
<input id="searchId">
<button onclick="searchOrder()">Search</button>

<div id="orders"></div>

</div>

</div>

<script>
let cart = [];
let currentOrderId = null;

function showCustomer(){
  document.getElementById("customer").style.display="block";
  document.getElementById("admin").style.display="none";
}

function showAdmin(){
  document.getElementById("customer").style.display="none";
  document.getElementById("admin").style.display="block";
  loadOrders();
}

function addItem(name, price){
  cart.push({name, price});
  renderCart();
}

function renderCart(){
  let list = document.getElementById("cart");
  list.innerHTML="";
  let total=0;

  cart.forEach(i=>{
    total+=i.price;
    let li=document.createElement("li");
    li.innerText=i.name+" ₹"+i.price;
    list.appendChild(li);
  });

  document.getElementById("total").innerText="Total: ₹"+total;
}

function placeOrder(){
  let mobile=document.getElementById("mobile").value;
  let tableNo=document.getElementById("tableNo").value;

  let total=cart.reduce((s,i)=>s+i.price,0);

  let order={
    id:Date.now().toString(),
    mobile,tableNo,items:cart,total,
    status:"Pending",
    createdAt:Date.now()
  };

  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  orders.push(order);
  localStorage.setItem("orders",JSON.stringify(orders));

  currentOrderId=order.id;

  alert("Order Placed ID: "+order.id);
}

function uploadScreenshot(){
  let file=document.getElementById("file").files[0];
  let reader=new FileReader();

  reader.onload=function(){
    let orders=JSON.parse(localStorage.getItem("orders")||"[]");
    let order=orders.find(o=>o.id===currentOrderId);

    if(order){
      order.screenshot=reader.result;
      localStorage.setItem("orders",JSON.stringify(orders));
      alert("Uploaded");
    }
  }

  if(file) reader.readAsDataURL(file);
}

function loadOrders(){
  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  let div=document.getElementById("orders");
  div.innerHTML="";

  orders.forEach(o=>{
    let d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      ID: ${o.id}<br>
      Table: ${o.tableNo}<br>
      ₹${o.total}<br>
      Status: ${o.status}<br>
      ${o.screenshot? `<img src="${o.screenshot}">`:""}
    `;

    div.appendChild(d);
  });
}

function searchOrder(){
  let id=document.getElementById("searchId").value;
  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  let o=orders.find(x=>x.id===id);

  if(o) alert("Table "+o.tableNo+" ₹"+o.total);
  else alert("Not found");
}
</script>

</body>
</html>
