let cart=[]

const menuDiv=document.getElementById("menu")

menu.forEach((item,i)=>{

menuDiv.innerHTML+=`

<div class="card">
<img src="${item.img}">
<h4>${item.name}</h4>
<p class="price">₹${item.price}</p>
<button class="addbtn" onclick="add(${i})">Add</button>
</div>

`

})

function add(i){

let item=menu[i]

let exist=cart.find(x=>x.name==item.name)

if(exist){

exist.qty++

}else{

cart.push({...item,qty:1})

}

updateCart()

}

function remove(i){

cart.splice(i,1)

updateCart()

}

function updateCart(){

let html=""

let total=0

cart.forEach((item,index)=>{

total+=item.price*item.qty

html+=`

<p>

${item.name} x ${item.qty}

₹${item.price*item.qty}

<button class="remove" onclick="remove(${index})">X</button>

</p>

`

})

document.getElementById("cartitems").innerHTML=html

document.getElementById("total").innerText="Total ₹"+total

document.getElementById("count").innerText=cart.length

}

function toggleCart(){

document.getElementById("cartpanel").classList.toggle("open")

}

function placeOrder(){

let name=document.getElementById("name").value

let total=0

let list=""

cart.forEach(item=>{

total+=item.price*item.qty

list+=item.name+" x"+item.qty+" - ₹"+(item.price*item.qty)+"%0A"

})

let id="ORD"+Math.floor(Math.random()*999999)

let date=new Date()

let msg=`🧾 Cafe Order%0A%0AOrder ID: ${id}%0ACustomer: ${name}%0A%0AItems:%0A${list}%0ATotal: ₹${total}%0A%0ADate: ${date}`

window.open(`https://wa.me/918709189586?text=${msg}`)

}

</script>
