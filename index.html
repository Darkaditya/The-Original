<!DOCTYPE html>
<html>
<head>
  <title>Adyra Restaurant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; margin: 0; background: #f8f8f8; }
    header { background: #e23744; color: white; padding: 15px; text-align: center; }
    .container { padding: 15px; }
    input, button {
      width: 100%; padding: 10px; margin: 5px 0;
      border-radius: 8px; border: 1px solid #ccc;
    }
    button { background: #e23744; color: white; border: none; }
    .menu-item, .card {
      background: white; padding: 10px; margin: 10px 0;
      border-radius: 10px;
    }
    .admin { display: none; }
  </style>
</head>

<body>

<header>🍽️ Adyra Restaurant</header>

<div class="container">

<button onclick="showCustomer()">Customer</button>
<button onclick="showAdminLogin()">Admin</button>

<!-- CUSTOMER -->
<div id="customer">

<h3>Login</h3>
<input id="mobile" placeholder="Mobile Number" oninput="loadMyOrders()">
<input id="tableNo" placeholder="Table Number">

<h3>My Orders</h3>
<div id="myOrders"></div>

<h3>Menu</h3>
<div class="menu-item">Pizza ₹200 <button onclick="addItem('Pizza',200)">Add</button></div>
<div class="menu-item">Burger ₹100 <button onclick="addItem('Burger',100)">Add</button></div>
<div class="menu-item">Pasta ₹150 <button onclick="addItem('Pasta',150)">Add</button></div>

<h3>Cart</h3>
<ul id="cart"></ul>
<h4 id="total"></h4>

<button onclick="placeOrder()">Place Order</button>

<h3>Upload Payment Screenshot</h3>
<input type="file" id="file">
<button onclick="uploadScreenshot()">Upload</button>

</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="admin">
  <h3>Admin Login</h3>
  <input id="adminPass" type="password">
  <button onclick="checkPassword()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin">
<h3>All Orders</h3>
<div id="orders"></div>
</div>

</div>

<script>

let cart = [];
let currentOrderId = null;

// UI
function showCustomer(){ hideAll(); document.getElementById("customer").style.display="block"; }
function showAdminLogin(){ hideAll(); document.getElementById("adminLogin").style.display="block"; }
function showAdminPanel(){ hideAll(); document.getElementById("adminPanel").style.display="block"; loadOrders(); }
function hideAll(){
  document.getElementById("customer").style.display="none";
  document.getElementById("adminLogin").style.display="none";
  document.getElementById("adminPanel").style.display="none";
}

// PASSWORD
function checkPassword(){
  if(document.getElementById("adminPass").value === "adyra123456"){
    showAdminPanel();
  } else alert("Wrong Password");
}

// CART
function addItem(name, price){
  let item = cart.find(i=>i.name===name);
  if(item) item.qty++;
  else cart.push({name, price, qty:1});
  renderCart();
}

function renderCart(){
  let total=0;
  let list=document.getElementById("cart");
  list.innerHTML="";
  cart.forEach(i=>{
    total+=i.price*i.qty;
    let li=document.createElement("li");
    li.innerText=`${i.name} x${i.qty} = ₹${i.price*i.qty}`;
    list.appendChild(li);
  });
  document.getElementById("total").innerText="Total ₹"+total;
}

// PLACE ORDER
function placeOrder(){
  let mobile=document.getElementById("mobile").value;
  let tableNo=document.getElementById("tableNo").value;

  let total=cart.reduce((s,i)=>s+i.price*i.qty,0);

  let order={
    id:Date.now().toString(),
    mobile, tableNo, items:cart, total,
    status:"Pending",
    payment:"Not Verified",
    createdAt:Date.now()
  };

  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  orders.push(order);
  localStorage.setItem("orders",JSON.stringify(orders));

  currentOrderId=order.id;

  loadMyOrders();

  alert("Order Placed!");
}

// CUSTOMER VIEW OWN ORDERS
function loadMyOrders(){
  let mobile=document.getElementById("mobile").value;
  let orders=JSON.parse(localStorage.getItem("orders")||"[]");

  let my = orders.filter(o=>o.mobile===mobile);

  let div=document.getElementById("myOrders");
  div.innerHTML="";

  my.forEach(o=>{
    let d=document.createElement("div");
    d.className="card";

    let items=o.items.map(i=>`${i.name} x${i.qty}`).join(", ");

    d.innerHTML=`
      Order ID: ${o.id}<br>
      Items: ${items}<br>
      Total: ₹${o.total}<br>
      Status: ${o.status}<br>
      Payment: ${o.payment}
    `;

    div.appendChild(d);
  });
}

// UPLOAD SCREENSHOT
function uploadScreenshot(){
  let file=document.getElementById("file").files[0];
  let reader=new FileReader();

  reader.onload=function(){
    let orders=JSON.parse(localStorage.getItem("orders")||"[]");
    let order=orders.find(o=>o.id===currentOrderId);

    if(order){
      order.screenshot=reader.result;
      localStorage.setItem("orders",JSON.stringify(orders));
      alert("Uploaded");
    }
  }

  if(file) reader.readAsDataURL(file);
}

// ADMIN
function loadOrders(){
  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  let div=document.getElementById("orders");
  div.innerHTML="";

  orders.forEach(o=>{
    let items=o.items.map(i=>`${i.name} x${i.qty}`).join("<br>");

    let d=document.createElement("div");
    d.className="card";

    d.innerHTML=`
      <b>ID:</b> ${o.id}<br>
      <b>Table:</b> ${o.tableNo}<br>
      <b>Items:</b><br>${items}<br>
      <b>Total:</b> ₹${o.total}<br>

      <b>Status:</b> ${o.status}
      <button onclick="updateStatus('${o.id}')">Toggle</button><br>

      <b>Payment:</b> ${o.payment}
      <button onclick="updatePayment('${o.id}')">Verify</button><br>

      ${o.screenshot? `<img src="${o.screenshot}" width="100">`:""}
    `;

    div.appendChild(d);
  });
}

// UPDATE STATUS
function updateStatus(id){
  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  let o=orders.find(x=>x.id===id);
  o.status = (o.status==="Pending") ? "Completed" : "Pending";
  localStorage.setItem("orders",JSON.stringify(orders));
  loadOrders();
}

// UPDATE PAYMENT
function updatePayment(id){
  let orders=JSON.parse(localStorage.getItem("orders")||"[]");
  let o=orders.find(x=>x.id===id);
  o.payment = (o.payment==="Not Verified") ? "Verified" : "Not Verified";
  localStorage.setItem("orders",JSON.stringify(orders));
  loadOrders();
}

</script>

</body>
</html>
